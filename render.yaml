services:
  - type: web
    name: veterinaria-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: api_telegram
        sync: false # Set this in Render dashboard
      - key: DATABASE_URL
        sync: false # Set this in Render dashboard
      - key: PYTHON_VERSION
        value: 3.10.0
