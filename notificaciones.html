<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="PawCare - Centro de notificaciones">
  <title>PawCare — Notificaciones</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div class="layout">

  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">🐾</div>
      <div class="logo-text">
        <span class="logo-name">PawCare</span>
        <span class="logo-sub">VETERINARIA</span>
      </div>
    </div>
    <nav class="sidebar-nav">
      <div class="nav-section-label">Principal</div>
      <a class="nav-item" href="index.html"><span class="nav-icon">🏠</span> Dashboard</a>
      <div class="nav-section-label">Gestión</div>
      <a class="nav-item" href="clientes.html"><span class="nav-icon">👥</span> Clientes</a>
      <a class="nav-item" href="mascotas.html"><span class="nav-icon">🐶</span> Mascotas</a>
      <a class="nav-item" href="citas.html"><span class="nav-icon">📅</span> Citas</a>
      <div class="nav-section-label">Sistema</div>
      <a class="nav-item active" href="notificaciones.html">
        <span class="nav-icon">🔔</span> Notificaciones
        <span class="nav-badge" id="notif-badge" style="display:none">0</span>
      </a>
    </nav>
    <div class="sidebar-footer"><p class="version">PawCare v1.0 · 2025</p></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div class="topbar-title">
        <h1>Notificaciones</h1>
        <div class="breadcrumb">Centro de actividad del sistema</div>
      </div>
      <div class="topbar-actions">
        <span class="topbar-date" id="topbar-date"></span>
        <button class="notif-btn" id="notif-toggle-btn">🔔<span class="notif-dot" id="notif-dot"></span></button>
      </div>
    </header>

    <div class="content">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:24px">
        <div>
          <h2 style="font-size:20px;font-weight:700">Historial de Notificaciones</h2>
          <p style="font-size:13px;color:var(--text-muted);margin-top:4px" id="notif-count">Cargando...</p>
        </div>
        <div style="display:flex;gap:10px">
          <button class="btn btn-secondary" id="btn-mark-all">✓ Marcar todas leídas</button>
          <button class="btn btn-danger" id="btn-delete-read">🗑 Limpiar leídas</button>
        </div>
      </div>

      <!-- Filter tabs -->
      <div style="display:flex;gap:8px;margin-bottom:20px">
        <button class="btn btn-secondary tab-btn active" data-filter="all">Todas</button>
        <button class="btn btn-secondary tab-btn" data-filter="unread">No leídas</button>
        <button class="btn btn-secondary tab-btn" data-filter="info">Info</button>
        <button class="btn btn-secondary tab-btn" data-filter="success">Éxito</button>
        <button class="btn btn-secondary tab-btn" data-filter="warning">Aviso</button>
        <button class="btn btn-secondary tab-btn" data-filter="error">Error</button>
      </div>

      <!-- Notifications list -->
      <div id="notif-full-list" style="display:flex;flex-direction:column;gap:10px">
        <div style="text-align:center;padding:48px;color:var(--text-muted)">
          <div style="font-size:40px;opacity:.5;margin-bottom:12px">🔔</div>
          <div class="spinner" style="margin:0 auto"></div>
        </div>
      </div>
    </div>
  </main>
</div>

<!-- Notification slide-over panel -->
<aside class="notif-panel" id="notif-panel">
  <div class="notif-panel-header">
    <h3>🔔 Notificaciones</h3>
    <div class="notif-panel-actions">
      <button class="btn btn-sm btn-secondary" onclick="notifManager.markAllRead()">Marcar leídas</button>
      <button class="btn btn-sm btn-secondary btn-icon" id="notif-close-btn">✕</button>
    </div>
  </div>
  <div class="notif-list" id="notif-list"></div>
</aside>

<div id="toast-container"></div>
<script src="js/app.js"></script>
<script src="js/notifications.js"></script>
<script>
const TIPO_ICONS = { info:'ℹ️', success:'✅', warning:'⚠️', error:'❌' };
const TIPO_BADGE = { info:'badge-info', success:'badge-success', warning:'badge-warning', error:'badge-danger' };
let allNotifs = [];
let currentFilter = 'all';

async function loadAllNotifs() {
  const data = await api('notificaciones.php?limit=100');
  allNotifs = data.notificaciones;
  document.getElementById('notif-count').textContent =
    `${data.total} notificación${data.total !== 1 ? 'es' : ''} en total`;
  renderNotifs();
}

function renderNotifs() {
  const list = document.getElementById('notif-full-list');
  let filtered = allNotifs;
  if (currentFilter === 'unread') filtered = allNotifs.filter(n => !n.leida);
  else if (currentFilter !== 'all') filtered = allNotifs.filter(n => n.tipo === currentFilter);

  if (!filtered.length) {
    list.innerHTML = `<div style="text-align:center;padding:64px;color:var(--text-muted)">
      <div style="font-size:40px;opacity:.4;margin-bottom:12px">🔕</div>
      <p>No hay notificaciones en esta categoría</p></div>`;
    return;
  }
  list.innerHTML = filtered.map(n => `
    <div class="notif-item card ${n.leida ? '' : 'unread'} fade-in"
         data-id="${n.id}"
         style="padding:18px;cursor:${n.leida ? 'default' : 'pointer'}"
         onclick="markOne(${n.id}, this)">
      <div style="font-size:24px;flex-shrink:0">${TIPO_ICONS[n.tipo] || '🔔'}</div>
      <div style="flex:1">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
          <strong style="font-size:15px">${n.titulo}</strong>
          <span class="badge ${TIPO_BADGE[n.tipo] || 'badge-muted'}">${n.tipo}</span>
          ${!n.leida ? '<span class="badge badge-accent" style="margin-left:auto">Nueva</span>' : ''}
        </div>
        <div style="font-size:14px;color:var(--text-secondary);margin-bottom:6px">${n.mensaje}</div>
        <div style="font-size:11px;color:var(--text-muted)">${timeAgo(n.created_at)} · ${n.created_at}</div>
      </div>
      <button class="btn btn-sm btn-danger btn-icon" style="flex-shrink:0;align-self:flex-start"
              onclick="event.stopPropagation();deleteOne(${n.id},this)" title="Eliminar">🗑</button>
    </div>`).join('');
}

async function markOne(id, el) {
  const n = allNotifs.find(x => x.id === id);
  if (!n || n.leida) return;
  await api(`notificaciones.php?id=${id}`, 'PUT');
  n.leida = 1;
  renderNotifs();
  notifManager.refresh();
}

async function deleteOne(id, btn) {
  await api(`notificaciones.php?id=${id}`, 'DELETE');
  allNotifs = allNotifs.filter(n => n.id !== id);
  renderNotifs();
  showToast('Notificación eliminada', 'warning');
}

// Tab filters
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentFilter = btn.dataset.filter;
    renderNotifs();
  });
});

// Buttons
document.getElementById('btn-mark-all').addEventListener('click', async () => {
  await notifManager.markAllRead();
  await loadAllNotifs();
});

document.getElementById('btn-delete-read').addEventListener('click', async () => {
  if (!confirm('¿Eliminar todas las notificaciones leídas?')) return;
  await api('notificaciones.php?id=all', 'DELETE');
  showToast('Notificaciones leídas eliminadas', 'warning');
  await loadAllNotifs();
});

document.addEventListener('DOMContentLoaded', loadAllNotifs);
</script>
</body>
</html>
